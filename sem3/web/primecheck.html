<html>
    <head>
        <script type="text/javascript">
            function isPrime(number) {
                if (number <= 1) return false;
                else if (number == 2) return true;
                for (var x = 2; x <= Math.sqrt(number); x++)
                    if (number % x == 0) return false;
                return true;
            }
            function checkPrime() {
                var num = parseInt(document.form.num.value);
                if (isPrime(num)) 
                    document.write('Number is prime');
                else document.write('Number is not prime');
            }
        </script>
    </head>
    <body>
        <form name="form">
            <input type="number" name="num" placeholder="number">
            <input type="button" onclick="checkPrime()" value="check">
        </form>
    </body>
</html>
