<html>
    <head>
        <script type="text/javascript">
            function AddNumbers() {
                let num1 = parseInt(document.mainForm.num1.value);
                let num2 = parseInt(document.mainForm.num2.value);
                let sum = num1 + num2;
                document.mainForm.result.value = sum;
            }
        </script>
        <title>Addition of numbers</title>
    </head>
    <body>
        <form name="mainForm">
            <label for="num1">First number: </label>
            <br>
            <input type="number" name="num1">
            <br>
            <label for="num2">Second number: </label>
            <br>
            <input type="number" name="num2">
            <br>
            <label for="result">Result: </label>
            <br>
            <input type="number" name="result">
            <br>
            <br>
            <input type="button" onclick="AddNumbers();" value="Add">
        </form>
    </body>
</html>
