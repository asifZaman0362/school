<html>
    <head>
        <title>Armstrong check</title>
        <script type="text/javascript">
            function isArmstrong(number, len) {
                var x = number;
                var sum = 0;
                while (x > 0) {
                    sum += Math.pow(x % 10, len);
                    console.log(x);
                    x = Math.floor(x / 10);
                }
                return sum == number;
            }
            function checkArmstrong() {
                let numberElement = document.mainForm.armstrong_input;
                var number = parseInt(numberElement.value);
                var len = numberElement.value.length;
                document.getElementById("armstrong_result").innerHTML = "The number is" + (isArmstrong(number, len) ? "" : " not") + " armstrong.";
            }
            function isPrime(number) {
                if (number == 2) return true;
                else if (number <= 1) return false;
                var sqrtCeil = Math.ceil(Math.sqrt(number));
                for (var i = 2; i < sqrtCeil; i++)
                    if (number % i === 0)
                        return false;
                return true;
            }
            function checkPrime() {
                var prime = true;
                let numberElement = document.mainForm.prime_input;
                var number = parseInt(numberElement.value);
                document.getElementById("prime_result").innerHTML = "The number is" + (isPrime(number) ? "" : " not") + " prime.";
            }
        </script>
        <style>
            html, body {
                margin: 0;
            }
            body {
                display: flex;
                justify-content: grow;
                flex-direction: row;
            }
            form {
                padding: 40pt;
                margin: 0 100pt;
                width: 100%;
            }
            input {
                margin: 10px 0;
            }
            h1 {
                font-size: 32pt;
            }
            a {
                color: darkslategrey;
            }
        </style>
    </head>
    <body>
        <form name="mainForm">
            <h1><a href="https://en.wikipedia.org/wiki/Prime_number">Prime numbers</a></h1>
            <label for="prime_input">Number to check for prime property: </label>
            <br>
            <input type="number" name="prime_input" id="prime_input">
            <br>
            <input type="button" value="Check" onclick="checkPrime()">
            <p id="prime_result"></p>
            <br>
            <h1><a href="https://en.wikipedia.org/wiki/Narcissistic_number">Armstrong numbers</a></h1>
            <label for="armstrong_input">Number to check for armstrong property: </label>
            <br>
            <input type="number" name="armstrong_input" id="armstrong_input">
            <br>
            <input type="button" value="Check" onclick="checkArmstrong()">
            <p id="armstrong_result"></p>
        </form>
    </body>
</html>
