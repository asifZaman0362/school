<!DOCTYPE html>
<html>
    <head>
        <title>Input Validator</title>
        <style>
                html, body {
                    padding: 0;
                    margin: 0;
                    background-color: beige;
                }
                body {
                    font-family: 'Inter', sans-serif;
                    font-size: 120%;
                }
                br {
                    margin: 10px 0;
                }
                form {
                    width: 50vw;
                    margin-left: 25vw;
                    margin-top: 10vh;
                    height: 100%;
                }
                label {
                    font-weight: 500;
                }
                input {
                    width: 100%;
                    padding: 5px;
                    font-size: 100%;
                    font-family: 'Inter', sans-serif;
                }
                #buttonContainer {
                    margin-top: 20px;
                    width: 100%;
                    text-align: center;
                }
                input[type="submit"] {
                    text-align: center;
                    width: auto;
                }
                h2 {
                    font-size: 200%;
                    font-weight: 800;
                }
                .erroneous-input {
                    border-color: red;
                    outline-color: red;
                }
                .erroneous-input::placeholder {
                    color: red;
                }
            </style>
            <script>
                function ResetFieldAttrs(field) {
                    field.classList.remove("erroneous-input");
                }

                function ValidatePassword(password) {
                    if (password.length == 0) return -1;
                    for (let x = 0; x < password.length; x++) if (!(password.charCodeAt(x) >= 48 && password.charCodeAt(x) <= 57)) return 0;
                    return 1;
                }

                function ValidateName(name) {
                    let transformedName = name.toLowerCase();
                    for (var i = 0; i < name.length; i++) {
                        if ((transformedName.charCodeAt(i) > 122 || transformedName.charCodeAt(i) < 97) && transformedName.charCodeAt(i) != 32) return -1;
                    }
                    if (name.length == 0) return -2;
                    else return 1;
                }

                function ValidateForm() {
                    var form = document.forms["inputForm"];
                    var name_input = form.name;
                    var email_input = form.email;
                    var phone_input = form.phone;
                    var password_input = form.password;
                    var flag = true;
                    var name_result = ValidateName(name_input.value);
                    if (name_result != 1) {
                        if (name_result == -1)
                            name_input.placeholder = "Name may only contain alphabets!";
                        else name_input.placeholder = "Name may not be empty!";
                        name_input.value = "";
                        name_input.classList.add("erroneous-input");
                        flag = false;
                    }
                    var password_result = ValidatePassword(password_input.value);
                    if (password_result != 1) {
                        if (password_result == 0)
                            password_input.placeholder = "Password may only contain numbers!";
                        else password_input.placeholder = "Password may not be empty!"; 
                        password_input.classList.add("erroneous-input");
                        password_input.value = "";
                        flag = false;
                    }
                    return flag;
                }
            </script>
    </head>
    <body>
        <form name="inputForm" onsubmit="return ValidateForm()">
            <h2>Personal details</h2>
            <label for="name-input">Name:</label><br>
            <input type="text" name="name" id="name-input" oninput="ResetFieldAttrs(this)"><br>
            <label for="password-input">Password:</label><br>
            <input type="password" name="password" id="password-input" oninput="ResetFieldAttrs(this)"><br>
            <div id="buttonContainer">
                <input type="submit" value="Submit">
            </div>
        </form>
    </body>
</html>
