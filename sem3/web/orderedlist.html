<html>
    <body>
        <h1>HTML Ordered List Example</h1>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>Java Script</li>
            <li>Java</li>
            <li>PHP</li>
        </ol>
        <ol type="A">
            <li>HTML</li>
            <li>CSS</li>
            <li>Java Script</li>
            <li>Java</li>
            <li>PHP</li>
        </ol>
        <ol type="I">
            <li>HTML</li>
            <li>CSS</li>
            <li>Java Script</li>
            <li>Java</li>
            <li>PHP</li>
        </ol>
    </body>
</html>
